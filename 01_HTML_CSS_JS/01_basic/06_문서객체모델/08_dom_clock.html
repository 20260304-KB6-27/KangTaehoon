<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Script스니펫</title>
        <script>
            window.onload = function () {
                // 요소찾기
                const clock = document.querySelector('#clock');

                // this
                // 객체에서 this -> 그 객체
                // 이벤트핸들러 -> 이벤트가 발생한 요소
                // 일반 함수 -> window
                setInterval(() => {
                    const now = new Date();
                    clock.innerHTML = now.toString();
                }, 1000);
            };
        </script>
    </head>

    <body>
        <h1 id="clock"></h1>
    </body>
</html>
