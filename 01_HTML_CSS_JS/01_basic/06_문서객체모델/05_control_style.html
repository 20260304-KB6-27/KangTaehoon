<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Script스니펫</title>
        <script>
            window.onload = function () {
                let output = '';

                for (let i = 0; i < 256; i++) {
                    output += '<div></div>';
                }
                document.body.innerHTML = output;

                let divs = document.querySelectorAll('div'); // Nodelist
                divs.forEach((d) => {
                    d.style.height = '2px';
                    d.style.backgroundColor = `rgb(${i}, ${i}, ${i})`;
                });
                // for (let i = 0; i < 256; i++) {
                //     divs[i].style.height = '2px';
                //     divs[i].style.backgroundColor = `rgb(${i}, ${i}, ${i})`;
                // }
            };
        </script>
    </head>

    <body>
        <div></div>
    </body>
</html>
