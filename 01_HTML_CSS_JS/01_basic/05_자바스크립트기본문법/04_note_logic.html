<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script>
            const date = new Date();
            const mon = date.getMonth + 1;
            let season = '';
            if (3 <= mon && mon <= 5) {
                season = '봄';
            } else if (6 <= mon && mon < 9) {
                season = '여름';
            } else if (9 <= mon && mon < 12) {
                season = '가을';
            } else {
                season = '겨울';
            }
            alert(season + '입니다.');
        </script>
    </head>

    <body></body>
</html>
