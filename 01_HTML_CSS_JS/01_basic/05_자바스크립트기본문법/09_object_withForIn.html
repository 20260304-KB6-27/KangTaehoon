            //  new Object ()

            let product = new Object();

            product.제품명 = '7D 건조 망고';
            product.유형 = '당절임';
            product.성분 = '망고, 설탕, 메타중아황산나트륨, 치자황색소';
            product.원산지 = '필리핀';

            for (let key in product) {
                alert(product[key]);
            }
            // 생성자 함수
            function Product(제품먕, 유형, 성분, 원산지) {
                this.제품명 = 제품명;
                this.유형 = 유형;
                this.성분 = 성분;
                this.원산지 = 원산지;
            }

            let prod2 = new Product(
                '7D 건조 망고',
                '당절임',
                '망고, 설탕, 메타중아황산나트륨, 치자황색소',
                '필리핀',
            );

            for (let k in prod2) {
                alert(prod2[k]);
            }

            // Class 만들기 (ES6+)

            class Product {
                constructor(제품먕, 유형, 성분, 원산지) {
                    this.제품명 = 제품명;
                    this.유형 = 유형;
                    this.성분 = 성분;
                    this.원산지 = 원산지;
                }
            }
