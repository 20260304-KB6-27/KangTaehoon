<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <p>
                위의 내용에 동의합니까?
                <input
                    type="checkbox"
                    v-model="agree"
                    true-value="yes"
                    false-value="no"
                />
            </p>
            <hr />
            <p>선택된 값 : {{agree}}</p>
        </div>

        <script>
            const { createApp, ref } = Vue;

            createApp({
                setup() {
                    const agree = ref('');
                    return {
                        agree,
                    };
                },
            }).mount('#app');
        </script>
    </body>
</html>
