<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Options API</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <p>1보다 큰 수: <input type="text" v-model.number="num" /></p>
            <p>1부터 입력한 값까지의 합: {{sum}}</p>
            <p>1부터 입력한 값까지의 합: {{sum}}</p>
            <p>1부터 입력한 값까지의 합: {{sum}}</p>
        </div>

        <script>
            const { createApp } = Vue;

            createApp({
                name: 'App',
                data() {
                    return {
                        num: 0,
                    };
                },
                // computed 속성
                // 데이터 기반의 계산된 속성을 정의할대 사용
                // 의존하는 데이터 (반응형데이터)가 변경될 때만 재계산 (캐싱)
                // 템플릿에서 여러번 사용해도 계산은 한번만 수행

                computed: {
                    sum() {
                        let n = this.num;
                        console.log('num : ' + this.num);
                        // if (Number.isNaN(n)) return 0;
                        return (n * (n + 1)) / 2;
                    },
                },
            }).mount('#app');
        </script>
    </body>
</html>
