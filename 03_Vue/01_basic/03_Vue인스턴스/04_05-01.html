<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <p>금액: <input type="text" v-model.number="amount" /></p>
            <button @click="balance += amount">입금</button>
            <button @click="balance -= amount">인출</button>
            <br />
            <h3>개인 잔고: {{balance}}</h3>
        </div>

        <script>
            const { createApp, ref } = Vue;

            createApp({
                setup() {
                    const amount = ref(0);
                    const balance = ref(0);
                    return {
                        amount,
                        balance,
                    };
                },
            }).mount('#app');
        </script>
    </body>
</html>
