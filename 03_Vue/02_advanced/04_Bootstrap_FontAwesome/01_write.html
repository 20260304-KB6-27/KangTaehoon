<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Script스니펫</title>

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />

        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        />

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div class="container">

            <form>
                <h1><i class="fa-regular fa-pen-to-square"></i> 새 글쓰기</h1>
                
                <p>제목</p>
                <input class="form-control" ></input>
                <p class="mt-2">작성자</p>
                <input class="form-control" ></input>
                <p class="mt-2">내용</p>
                <textarea class="form-control" rows="6"></textarea>
                
                <!-- 확인, 취소, 목록 -->
                <div class="my-2">
                    <button class="btn btn-primary"><i class="fa-solid fa-check"></i> 확인</button>
                    <button class="btn btn-primary"><i class="fa-solid fa-arrow-rotate-left"></i> 취소</button>
                    <button class="btn btn-primary"><i class="fa-solid fa-list"></i> 목록</button>
                </div>
            </form>
        </div>
    </body>
</html>
