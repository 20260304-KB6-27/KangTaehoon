<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Script스니펫</title>

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />

        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        />

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div class="container">
            <form>
                <h1 class="my-5">
                    <i class="fa-solid fa-user-plus"></i> 회원가입
                </h1>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label"
                        ><i class="fa-solid fa-user"></i> 사용자 ID:</label
                    >
                    <input
                        type="text"
                        class="form-control"
                        id="exampleInputEmail1"
                        aria-describedby="emailHelp"
                    />
                </div>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label"
                        ><i class="fa-solid fa-lock"></i> 비밀번호 :</label
                    >
                    <input
                        type="password"
                        class="form-control"
                        id="exampleInputEmail1"
                        aria-describedby="emailHelp"
                    />
                </div>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label"
                        ><i class="fa-solid fa-lock"></i> 비밀번호 확인 :</label
                    >
                    <input
                        type="password"
                        class="form-control"
                        id="exampleInputEmail1"
                        aria-describedby="emailHelp"
                    />
                </div>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label"
                        ><i class="fa-regular fa-envelope"></i> email:</label
                    >
                    <input
                        type="email"
                        class="form-control"
                        id="exampleInputEmail1"
                        aria-describedby="emailHelp"
                    />
                </div>

                <!-- 파일 -->
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label"
                        ><i class="fa-solid fa-user-astronaut"></i> 아바타
                        이미지</label
                    >
                    <div class="input-group mb-3">
                        <input
                            type="file"
                            class="form-control"
                            id="inputGroupFile01"
                        />
                    </div>
                </div>

                <div class="mb-3 d-flex justify-content-center">
                    <button class="btn btn-primary">
                        <i class="fa-solid fa-user-plus"></i> 회원가입
                    </button>
                </div>
            </form>
        </div>
    </body>
</html>
